<section class="section devis">
  <h2>Demande d’entretien / ramonage</h2>

  <form action="mailto:contact@chaleuretflemme.fr" method="POST" enctype="text/plain">

    <!-- Identité -->
    <input type="text" name="Nom" placeholder="Nom *" required>
    <input type="text" name="Prénom" placeholder="Prénom *" required>

    <input type="text" name="Adresse" placeholder="Adresse complète *" required>
    <input type="text" name="Code postal" placeholder="Code postal *" required>

    <input type="tel" name="Téléphone" placeholder="Téléphone *" required>

    <!-- Type de foyer -->
    <h3>Type de foyer *</h3>
    <div class="options">
      <label><input type="checkbox" name="Foyer" value="Poêle à bois"> Poêle à bois</label>
      <label><input type="checkbox" name="Foyer" value="Cheminée"> Cheminée</label>
      <label><input type="checkbox" name="Foyer" value="Insert"> Insert</label>
      <label><input type="checkbox" name="Foyer" value="Poêle à granulés"> Poêle à granulés</label>
    </div>

    <!-- Commentaire -->
    <h3>Commentaire</h3>
    <textarea name="Commentaire" placeholder="Informations complémentaires, disponibilité, accès, etc."></textarea>

    <!-- Bouton -->
    <button type="submit">Envoyer la demande</button>

  </form>
</section>
